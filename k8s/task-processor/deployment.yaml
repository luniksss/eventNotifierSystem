apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-processor
  namespace: event-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-processor
  template:
    metadata:
      labels:
        app: task-processor
    spec:
      containers:
        - name: task-processor
          image: eventnotifiersystem-task-processor:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: rabbitmq-url
            - name: NOTIFICATIONS_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: notifications-exchange